<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Grid Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

    <div id="roadContainer">
        <img id="road" src="intersec.png">
        <div id="grid"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <h3>Cars</h3>

        <div id="carTray">
            <div class="car" draggable="true"></div>
        </div>
    </div>

</div>

<script>
const grid = document.getElementById("grid");

const rows = 10;
const cols = 20;

let draggedCar = null;
let sourceCell = null;

// Build grid
for (let i = 0; i < rows * cols; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");

    cell.addEventListener("dragover", e => e.preventDefault());

    cell.addEventListener("drop", e => {
        e.preventDefault();

        if (!draggedCar) return;

        if (cell.querySelector(".car")) return;

        if (sourceCell)
            sourceCell.removeChild(draggedCar);

        cell.appendChild(draggedCar);

        draggedCar = null;
        sourceCell = null;
    });

    grid.appendChild(cell);
}

document.querySelectorAll(".car").forEach(car => {

    car.addEventListener("dragstart", () => {
        draggedCar = car;
        sourceCell = car.parentElement;
    });

    car.addEventListener("dragend", () => {
        draggedCar = null;
        sourceCell = null;
    });

});

function createTrafficLight() {
    const tl = document.createElement("div");
    tl.classList.add("traffic-light");
    return tl;
}

function getCell(col,row){
    return grid.children[row * cols + col];
}

// Traffic Lights
getCell(7,2).appendChild(createTrafficLight());
getCell(12,2).appendChild(createTrafficLight());
getCell(7,7).appendChild(createTrafficLight());
getCell(12,7).appendChild(createTrafficLight());

const dashboard = document.getElementById("carTray");

dashboard.addEventListener("dragover", (e) => {
    e.preventDefault();
});

dashboard.addEventListener("drop", (e) => {
    e.preventDefault();

    if (!draggedCar) return;

    // Move the car back to the dashboard
    dashboard.appendChild(draggedCar);

    draggedCar = null;
    sourceCell = null;
});

</script>

</body>
</html>
